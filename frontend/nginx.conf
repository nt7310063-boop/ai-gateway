# Resolve service names at request time so a backend/VNC restart with new IP
# doesn't strand nginx with a stale cached IP (502 connection refused).
# Short TTL because VNC container is spawned dynamically — old NXDOMAIN cache
# would wedge the iframe for up to TTL seconds after start.
resolver 127.0.0.11 valid=2s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flow video uploads dominate; backend then streams to flow-api.
    # 600m = headroom over the upstream MAX_UPLOAD_SIZE_MB (500m default).
    client_max_body_size 600m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Per-profile VNC: /vnc/<12-hex-id>/...  →  http://grokflow-vnc-<id>:6901/...
    # Each profile has its own persistent VNC container with Chromium + CDP open.
    location ~ "^/vnc/([a-f0-9]{12})/(.*)$" {
        set $vnc_upstream "http://grokflow-vnc-$1:6901";
        proxy_pass $vnc_upstream/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location ~ "^/vnc/([a-f0-9]{12})/?$" {
        # clipboardSync=1 hooks the browser Clipboard API so Ctrl+C/V from
        # the host OS mirrors into the remote X11 CLIPBOARD selection.
        # Requires HTTPS context (we have it via Cloudflare) + user must
        # grant clipboard permission to the noVNC origin once.
        return 302 /vnc/$1/vnc.html?autoconnect=1&resize=remote&clipboardSync=1;
    }

    # Proxy backend routes (grokflow-backend).
    # The `(/|$)` anchor is required — without it the regex matches any
    # path that *starts with* `api`, `v1`, `docs`, etc. — including the
    # frontend's own `/api-docs` route and any `/apidocs`, `/healthy`,
    # `/docsfoo` etc. Those get incorrectly proxied to the backend (which
    # has no such routes) → 404 from FastAPI, or 502 when stale DNS sends
    # us to a non-backend container.
    location ~ ^/(api|v1|docs|redoc|openapi\.json|health|f)(/|$) {
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Video proxy uploads can take a while — bump above the 2-min default.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;  # stream uploads, don't buffer to disk
    }

    # Flow output downloads — alias /flow-output/<file> to the backend's
    # native FileResponse endpoint. Same-origin, no extra hop.
    location /flow-output/ {
        rewrite ^/flow-output/(.*)$ /api/flow/download/$1 break;
        set $flow_backend "http://backend:8000";
        proxy_pass $flow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }


    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
