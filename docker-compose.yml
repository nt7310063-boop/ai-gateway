# flowgrok — standalone stack for a single customer deploy.
#
# Bring up:  docker compose --env-file .env up -d
# Migrate:   docker compose exec backend alembic upgrade head
# Bootstrap: docker compose exec backend python -m app.scripts.create_admin
#
# Required env (see .env.example):
#   POSTGRES_PASSWORD, JWT_SECRET, ENCRYPTION_KEY, PUBLIC_DOMAIN
#
# The host machine must:
#   - have docker.sock available (mount below; needed to spawn VNC
#     containers for each Grok profile's browser session)
#   - have /etc/nginx/grokflow-vhosts/ created + writable by gid 10001
#     (see deploy/install_nginx_watcher.sh — copy from monorepo)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowgrok}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-flowgrok}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowgrok}"]
      interval: 10s
      timeout: 5s
      retries: 6
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: ai-gateway/backend:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-flowgrok}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-flowgrok}
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_PATH: /app/storage
      PROFILE_BASE_PATH: /app/browser_profiles
      PROFILE_BASE_PATH_HOST: ${PWD}/browser_profiles
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - storage_data:/app/storage
      - ./browser_profiles:/app/browser_profiles
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx/grokflow-vhosts:/host_nginx_vhosts
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536m

  # ai-gateway has no Grok-style job queue + no idle Chromium containers
  # to clean up — worker + idle-cleanup services are dropped here.
  # If you bolt Grok onto ai-gateway later, restore them from
  # products/flowgrok/docker-compose.yml.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_URL:-https://${PUBLIC_DOMAIN}}
    image: ai-gateway/frontend:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ | head -c 100 >/dev/null"]
      interval: 30s
      timeout: 5s

volumes:
  postgres_data:
  redis_data:
  storage_data:
